name: Android build

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            app/build/reports/
          if-no-files-found: warn

      - name: Post build log as commit comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          LOG=$(tail -n 400 build.log 2>/dev/null || echo "no build.log captured")
          {
            printf 'CI build failed on `%s`\n\n<details><summary>build log (tail)</summary>\n\n```\n' "${{ github.sha }}"
            printf '%s' "$LOG"
            printf '\n```\n</details>\n'
          } > comment_body.md
          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -F body=@comment_body.md
