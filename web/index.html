<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>LAPIS Mark (web)</title>
    <meta name="theme-color" content="#A70E13" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LAPIS Mark" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <noscript>
        <p style="padding:20px;color:#A70E13;">Cette page nécessite JavaScript pour lire les fichiers .xlsx.</p>
    </noscript>

    <!-- Shown only on a phone-sized screen held in landscape (iOS can't be locked programmatically). -->
    <div id="rotate-notice">
        <div class="rotate-icon">↻</div>
        <p>Veuillez tourner votre appareil en mode portrait.</p>
    </div>

    <!-- Picker -->
    <section id="picker" class="picker-screen">
        <div class="brand">LAPIS&nbsp;Mark <span class="tag">web</span></div>
        <label for="file" class="pick-button">Ouvrir un fichier .xlsx…</label>
        <input id="file" type="file"
               accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
        <p id="status" class="status"></p>
    </section>

    <!-- Grading -->
    <section id="grading" class="grading-screen" hidden>
        <div class="topbar">
            <span id="studentCounter" class="counter"></span>
            <span id="dirty" class="dirty" hidden>•&nbsp;modifié</span>
            <button id="saveBtn" class="btn-outline">SAUVER</button>
            <button id="menuBtn" class="btn-outline icon">⋮</button>
        </div>

        <div class="scroll">
            <div class="name-row">
                <h1 id="studentName" class="student-name"></h1>
                <span id="average" class="average"></span>
            </div>

            <!-- Red flag (GENERAL page only): tick to flag the student; when on, a reason field
                 appears right below. Hidden on criterion pages. -->
            <div id="redFlagBlock" class="redflag" hidden>
                <label class="redflag-toggle">
                    <input id="redFlagCheck" type="checkbox" />
                    <span>🚩 signalement</span>
                </label>
                <textarea id="redFlagReason" class="note-box redflag-reason"
                          placeholder="raison du signalement…" hidden></textarea>
            </div>

            <canvas id="dotRow" class="dot-row"></canvas>
            <p id="progress" class="progress"></p>
            <div class="rule"></div>

            <!-- Criterion detail -->
            <div id="critBlock">
                <div id="groupName" class="group-name"></div>
                <div id="groupCoef" class="group-coef"></div>
                <p id="contract" class="contract"></p>
                <p id="remarks" class="remarks"></p>
                <textarea id="noteBox" class="note-box" placeholder="ajouter une note…"></textarea>
            </div>

            <!-- Overview -->
            <div id="overviewBlock" hidden>
                <div class="group-name">vue générale</div>
                <p class="contract">moyenne générale et progression de l'étudiant</p>
                <div id="overviewTable" class="overview-table"></div>
            </div>
        </div>

        <div class="controls">
            <div class="marks" id="marks">
                <button class="mark clear" data-idx="-1">×</button>
                <button class="mark" data-idx="0">0</button>
                <button class="mark" data-idx="1">¼</button>
                <button class="mark" data-idx="2">½</button>
                <button class="mark" data-idx="3">¾</button>
                <button class="mark" data-idx="4">1</button>
            </div>
            <button id="backToNotes" class="btn-outline notes-back" hidden>‹ NOTES</button>
            <button id="overviewBtn" class="btn-primary">GÉNÉRAL</button>
            <div class="nav" id="critNav">
                <button id="prevCrit" class="btn-outline">‹ critère</button>
                <button id="nextCrit" class="btn-outline">critère ›</button>
            </div>
            <div class="nav">
                <button id="prevStudent" class="btn-outline">« étudiant</button>
                <button id="nextStudent" class="btn-outline">étudiant »</button>
            </div>
        </div>
    </section>

    <!-- Overflow menu -->
    <div id="menu" class="menu" hidden>
        <button data-act="filter">Filtre de groupes</button>
        <button data-act="completion">Complétude</button>
        <button data-act="notes">Notes</button>
        <button data-act="liste">Liste</button>
        <button data-act="change">Changer de fichier</button>
    </div>

    <!-- Group filter -->
    <section id="filter" class="overlay" hidden>
        <div class="overlay-head">groupes évalués</div>
        <p class="overlay-sub">décochez les groupes que vous n'évaluez pas</p>
        <div class="overlay-actions">
            <button id="selectAll" class="btn-text">SÉLECTIONNER TOUT</button>
            <button id="clearAll" class="btn-text">EFFACER SÉLECTION</button>
        </div>
        <div id="filterList" class="overlay-scroll"></div>
        <button id="filterBack" class="btn-primary overlay-back">RETOUR</button>
    </section>

    <!-- Completion -->
    <section id="completion" class="overlay" hidden>
        <div class="overlay-head">Complétude</div>
        <div id="completionContent" class="overlay-scroll"></div>
        <button id="completionBack" class="btn-primary overlay-back">RETOUR</button>
    </section>

    <!-- Completion subpage (student lists) -->
    <section id="subpage" class="overlay" hidden>
        <div id="subpageTitle" class="overlay-head"></div>
        <div id="subpageContent" class="overlay-scroll"></div>
        <button id="subpageBack" class="btn-primary overlay-back">RETOUR</button>
    </section>

    <!-- Notes carousel -->
    <section id="notes" class="overlay" hidden>
        <div class="overlay-head">Notes <span id="noteCounter" class="note-counter"></span></div>
        <div class="overlay-scroll">
            <div id="noteEmpty" class="sub-empty" hidden>aucune note enregistrée</div>
            <div id="noteBody">
                <h2 id="noteStudent" class="note-student"></h2>
                <div id="noteGroup" class="group-name"></div>
                <div id="noteCrit" class="note-crit"></div>
                <canvas id="noteDot" class="note-dot"></canvas>
                <textarea id="noteEdit" class="note-box"></textarea>
            </div>
        </div>
        <div class="nav nav-notes">
            <button id="prevNote" class="btn-outline">‹ note</button>
            <button id="nextNote" class="btn-outline">note ›</button>
        </div>
        <button id="notesBack" class="btn-primary overlay-back">RETOUR</button>
    </section>

    <script src="vendor/exceljs.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
